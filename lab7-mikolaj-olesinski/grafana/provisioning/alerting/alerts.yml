apiVersion: 1

groups:
  - orgId: 1
    name: lab7-errors
    folder: Lab7
    interval: 1m
    rules:
      - uid: lab7-errors-rate
        title: Wysoki wskaznik bledow pipeline
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: sum(rate(lab7_errors_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: OK
        execErrState: OK
        for: 2m
        annotations:
          summary: Ponad 0.05 bledow/s przez 2 min (search/scrape/llm)
        labels:
          severity: warning
