      size: 10066
    params:
      params.yaml:
        tune:
          input_train: data/splits/train_clean.csv
          input_test: data/splits/test_clean.csv
          output: results/tune_results.json
          sample_size: 10000
          cv_folds: 5
          random_state: 42
          n_iter_random: 20
          n_candidates_halving: exhaust
          active_models:
          - linear_svc
          - logistic_regression
          - multinomial_nb
          search_methods:
          - grid_search
          - random_search
          - halving_grid_search
          - halving_random_search
          mlflow_enabled: true
          mlflow_experiment: lab6_hyperparameter_tuning
          tag_key: run_group
          tag_value: default
          experiment: all_features
          vectorizer: tfidf
          bow_max_features: 50000
          num_scaler: minmax
          feature_selection: select_k_best
          n_top_features: 5000
          n_components:
          text_column: review_text
          label_column: LABEL-rating-category
          drop_from_features:
          - product_id
          - brand_id
          - product_name
          - brand_name
          - review_title
          - highlights
          - ingredients
          - primary_category
          - size
          - variation_value
          w2v_model: word2vec-google-news-300
          models:
            linear_svc:
              params:
                class_weight: balanced
                max_iter: 20000
              param_grid:
                clf__C:
                - 0.01
                - 0.1
                - 1
                - 10
            logistic_regression:
              params:
                class_weight: balanced
                max_iter: 5000
                solver: saga
              param_grid:
                clf__C:
                - 0.01
                - 0.1
                - 1
                - 10
                clf__l1_ratio:
                - 0.0
                - 1.0
            multinomial_nb:
              params: {}
              param_grid:
                clf__alpha:
                - 0.01
                - 0.1
                - 0.5
                - 1.0
                - 2.0
                clf__fit_prior:
                - true
                - false
    outs:
    - path: results/tune_results.json
      hash: md5
      md5: c96846cb983a7e3c319245a3f4152c54
      size: 3148
