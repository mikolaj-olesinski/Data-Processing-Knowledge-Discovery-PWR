schema: '2.0'
stages:
  preprocess:
    cmd: python scripts/preprocess.py
    deps:
    - path: data/raw
      hash: md5
      md5: 1879a37ccfe89870a8e73238e331f4ac.dir
      size: 524018363
      nfiles: 6
    - path: scripts/preprocess.py
      hash: md5
      md5: ce6736d59a008492ea335c0eb9d4dc38
      size: 4472
    params:
      params.yaml:
        preprocess:
          reviews_dir: data/raw
          product_info: data/raw/product_info.csv
          output: data/processed/reviews.csv
          drop_columns:
          - author_id
          - 'Unnamed: 0'
          - total_neg_feedback_count
          - total_pos_feedback_count
          - submission_time
          - helpfulness
          - total_feedback_count
          - LABEL-rating
          - variation_desc
          - sale_price_usd
          - value_price_usd
          - price_vs_value_ratio
          - child_min_price
          - child_max_price
          dropna_subsets:
          - review_text
          - product_id
          fill_unknown_cols:
          - skin_tone
          - eye_color
          - skin_type
          - hair_color
          - tertiary_category
          - variation_type
          - variation_value
          - size
          fill_empty_cols:
          - review_title
          - highlights
          - ingredients
    outs:
    - path: data/processed/reviews.csv
      hash: md5
      md5: 437903510e6fbea3924e6ac8fc053e6f
      size: 1561523297
  split:
    cmd: python scripts/split.py
    deps:
    - path: data/processed/reviews.csv
      hash: md5
      md5: 437903510e6fbea3924e6ac8fc053e6f
      size: 1561523297
    - path: scripts/split.py
      hash: md5
      md5: c872c72ee4b53f369a42d3f61b024b66
      size: 2127
    params:
      params.yaml:
        split:
          input: data/processed/reviews.csv
          train_output: data/splits/train.csv
          test_output: data/splits/test.csv
          test_size: 0.2
          random_state: 42
          stratify: true
          stratify_column: LABEL-rating-category
    outs:
    - path: data/splits/test.csv
      hash: md5
      md5: ac269f5faea2bf8a08c08a6205316f7c
      size: 312294434
    - path: data/splits/train.csv
      hash: md5
      md5: d9baff7ad258816832eb59ac0f85bcd3
      size: 1247600314
  train:
    cmd: python scripts/train.py
    deps:
    - path: data/splits/test_clean.csv
      hash: md5
      md5: f71d9fdde10887b728528b7baae61022
      size: 277529462
    - path: data/splits/test_w2v_clean.csv
      hash: md5
      md5: 0ff66410f4a73e5674a7d36449303e3d
      size: 309473157
    - path: data/splits/train_clean.csv
      hash: md5
      md5: 58020fce50b0c868e3458a02e935a5af
      size: 1108383693
    - path: data/splits/train_w2v_clean.csv
      hash: md5
      md5: 66540db769cf51f51b99bf175e5dc2f1
      size: 1236301939
    - path: scripts/train.py
      hash: md5
      md5: 387b6bcaf1a10a3fe7ff3e6ff7a5b86d
      size: 15702
    params:
      params.yaml:
        train:
          mlflow_experiment: sentiment_analysis
          input_train: data/splits/train_clean.csv
          input_test: data/splits/test_clean.csv
          label_column: LABEL-rating-category
          output: results/metrics.json
          text_column: review_text
          vectorizer: tfidf
          experiment: all_features
          active_model: linear_svc
          bow_max_features: 50000
          cv_folds: 5
          cv_sample:
          random_state: 42
          log_model: true
          skip_cv: true
          num_scaler: minmax
          tag_key: final
          tag_value: selectk_5000
          w2v_model: word2vec-google-news-300
          input_train_w2v: data/splits/train_w2v_clean.csv
          input_test_w2v: data/splits/test_w2v_clean.csv
          feature_selection: select_k_best
          n_top_features: 5000
          n_components:
          drop_from_features:
          - product_id
          - brand_id
          - product_name
          - brand_name
          - review_title
          - highlights
          - ingredients
          - primary_category
          - size
          - variation_value
          models:
            dummy:
              strategy: most_frequent
            linear_svc:
              class_weight: balanced
              max_iter: 5000
            random_forest:
              n_estimators: 200
              class_weight: balanced
              max_features: sqrt
    outs:
    - path: results/metrics.json
      hash: md5
      md5: 7797253de38348d2d2e33bb0a36187c0
      size: 184
