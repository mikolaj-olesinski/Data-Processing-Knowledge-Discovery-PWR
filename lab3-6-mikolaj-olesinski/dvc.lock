    params:
      params.yaml:
        preprocess:
          reviews_dir: data/raw
          product_info: data/raw/product_info.csv
          output: data/processed/reviews.csv
          drop_columns:
          - author_id
          - 'Unnamed: 0'
          - total_neg_feedback_count
          - total_pos_feedback_count
          - submission_time
          - helpfulness
          - total_feedback_count
          - LABEL-rating
          - variation_desc
          - sale_price_usd
          - value_price_usd
          - price_vs_value_ratio
          - child_min_price
          - child_max_price
          dropna_subsets:
          - review_text
          - product_id
          fill_unknown_cols:
          - skin_tone
          - eye_color
          - skin_type
          - hair_color
          - tertiary_category
          - variation_type
          - variation_value
          - size
          fill_empty_cols:
          - review_title
          - highlights
          - ingredients
    outs:
    - path: data/processed/reviews.csv
      hash: md5
      md5: 437903510e6fbea3924e6ac8fc053e6f
      size: 1561523297
  split:
    cmd: python scripts/split.py
    deps:
    - path: data/processed/reviews.csv
      hash: md5
      md5: 437903510e6fbea3924e6ac8fc053e6f
      size: 1561523297
    - path: scripts/split.py
      hash: md5
      md5: c872c72ee4b53f369a42d3f61b024b66
      size: 2127
    params:
      params.yaml:
        split:
          input: data/processed/reviews.csv
          train_output: data/splits/train.csv
          test_output: data/splits/test.csv
          test_size: 0.2
          random_state: 42
          stratify: true
          stratify_column: LABEL-rating-category
    outs:
    - path: data/splits/test.csv
      hash: md5
      md5: ac269f5faea2bf8a08c08a6205316f7c
      size: 312294434
    - path: data/splits/train.csv
      hash: md5
