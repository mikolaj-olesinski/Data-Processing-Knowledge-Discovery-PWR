stages:
  preprocess:
    cmd: python scripts/preprocess.py
    deps:
      - scripts/preprocess.py
      - ${preprocess.reviews_dir}
    params:
      - preprocess
    outs:
      - ${preprocess.output}

  split:
    cmd: python scripts/split.py
    deps:
      - scripts/split.py
      - ${split.input}
    params:
      - split
    outs:
      - ${split.train_output}
      - ${split.test_output}

  clean_text:
    cmd: python scripts/clean_text.py
    deps:
      - scripts/clean_text.py
      - ${clean_text.input_train}
      - ${clean_text.input_test}
    params:
      - clean_text
    outs:
      - ${clean_text.train_output}
      - ${clean_text.test_output}

  clean_text_w2v:
    cmd: python scripts/clean_text_w2v.py
    deps:
      - scripts/clean_text_w2v.py
      - ${clean_text_w2v.input_train}
      - ${clean_text_w2v.input_test}
    params:
      - clean_text_w2v
    outs:
      - ${clean_text_w2v.train_output}
      - ${clean_text_w2v.test_output}

  train:
    cmd: python scripts/train.py
    deps:
      - scripts/train.py
      - scripts/pipeline.py
      - ${train.input_train}
      - ${train.input_test}
      - ${train.input_train_w2v}
      - ${train.input_test_w2v}
    params:
      - train
    metrics:
      - ${train.output}:
          cache: false

  tune:
    cmd: python scripts/tune.py
    deps:
      - scripts/tune.py
      - scripts/pipeline.py
      - ${tune.input_train}
      - ${tune.input_test}
    params:
      - tune
    metrics:
      - ${tune.output}:
          cache: false

  shap:
    foreach:
      - {model: linear_svc,          method: grid_search}
      - {model: logistic_regression, method: grid_search}
      - {model: multinomial_nb,      method: grid_search}
    do:
      cmd: >-
        python scripts/explain_shap.py
        --model ${item.model}
        --method ${item.method}
      deps:
        - scripts/explain_shap.py
        - ${tune.input_test}
      params:
        - tune.mlflow_experiment
        - tune.text_column
        - tune.label_column
        - shap
      outs:
        - results/shap/${item.model}__${item.method}:
            cache: false

  execute_eda_raw:
    cmd: papermill notebooks/eda_raw.ipynb data/notebooks/eda_raw_executed.ipynb --cwd
      $(pwd)
    deps:
      - notebooks/eda_raw.ipynb
      - data/raw
    outs:
      - data/notebooks/eda_raw_executed.ipynb:
          cache: false

  execute_eda:
    cmd: papermill notebooks/eda.ipynb data/notebooks/eda_executed.ipynb --cwd $(pwd)
    deps:
      - notebooks/eda.ipynb
      - data/processed/reviews.csv
    outs:
      - data/notebooks/eda_executed.ipynb:
          cache: false
